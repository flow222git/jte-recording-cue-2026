<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>練息場｜心理能量管理 錄影大字報</title>
  <style>
    :root { --bg:#f8fbff; --paper:#ffffff; --ink:#16181d; --muted:#546173; --line:rgba(16,40,78,.12); --blue:#0b63d1; --blue-strong:#0746a5; --amber-soft:#fff2d9; --amber:#7a4a00; --base:1; color-scheme:light; }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Noto Sans TC","PingFang TC","Helvetica Neue",Arial,sans-serif;letter-spacing:0} button,select{font:inherit}
    .app{min-height:100vh;padding:18px clamp(18px,3vw,44px) 24px;display:grid;grid-template-rows:auto 1fr auto;gap:16px}.topbar{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center;padding:10px 14px 10px 18px;border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.96);box-shadow:none;backdrop-filter:none;-webkit-backdrop-filter:none}.brand{min-width:0}.kicker{color:var(--blue);font-size:18px;font-weight:900;margin-bottom:0;white-space:nowrap}.brand h1{display:none;margin:0;font-size:clamp(22px,3vw,34px);line-height:1.1;letter-spacing:0}.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill,.icon-btn,.select{border:1px solid rgba(11,99,209,.18);background:#fff;color:var(--ink);border-radius:999px;min-height:40px;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;box-shadow:none}.icon-btn{width:42px;padding:0;font-weight:900}.pill.primary{background:var(--blue);border-color:var(--blue);color:white}.select{appearance:none;padding-right:34px;background-image:linear-gradient(45deg,transparent 50%,#6b7483 50%),linear-gradient(135deg,#6b7483 50%,transparent 50%);background-position:calc(100% - 18px) 17px,calc(100% - 12px) 17px;background-size:6px 6px,6px 6px;background-repeat:no-repeat}
    .stage{min-height:0;display:grid;place-items:stretch}.slide{display:none;min-height:0}.slide.active{display:grid;grid-template-rows:auto 1fr;gap:14px}.slide-head{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:end;gap:16px;padding:0 4px}.episode{color:var(--blue);font-weight:850;font-size:calc(18px * var(--base));line-height:1.25}.title{margin:4px 0 0;font-size:clamp(30px,4.3vw,58px);line-height:1.08;letter-spacing:0}.time{color:var(--muted);font-size:calc(17px * var(--base));font-weight:700;white-space:nowrap;padding-bottom:8px}.content{min-height:0;overflow:auto;padding:0 4px 12px;scroll-behavior:smooth}.cue{margin:0 0 16px;padding:22px 26px;border-radius:18px;background:linear-gradient(90deg,rgba(11,99,209,.15),rgba(11,99,209,.05));border-left:8px solid var(--blue);font-size:calc(27px * var(--base));line-height:1.5;font-weight:900}.section{margin:0 0 18px;border:1px solid rgba(11,99,209,.10);border-radius:22px;background:var(--paper);box-shadow:none;overflow:hidden}.section-title{padding:17px 24px 16px;background:linear-gradient(90deg,#dbe9ff 0%,#f1f7ff 100%);border-bottom:1px solid rgba(11,99,209,.12);color:var(--blue-strong);font-size:calc(27px * var(--base));line-height:1.45;font-weight:950}.points{display:grid;grid-template-columns:minmax(0,1fr);gap:13px;padding:17px}.point{padding:18px 22px;border:1px solid rgba(16,24,40,.08);border-radius:18px;background:#fff}.label{color:var(--blue-strong);font-size:calc(25px * var(--base));line-height:1.38;font-weight:950;margin:0 0 10px}.point p,.point li{margin:0;font-size:calc(26px * var(--base));line-height:1.62;font-weight:650}.quote{margin:0 0 18px;padding:22px 26px;border-radius:18px;background:var(--amber-soft);color:var(--amber);font-size:calc(28px * var(--base));line-height:1.48;font-weight:900}.notes{margin:0;padding:18px 22px;border-radius:18px;background:rgba(255,255,255,.96);border:1px dashed rgba(11,99,209,.28);color:#344053;font-size:calc(20px * var(--base));line-height:1.62;font-weight:650}[contenteditable=true]{outline:none;border-radius:10px}[contenteditable=true]:focus{box-shadow:0 0 0 4px rgba(11,99,209,.16);background:rgba(255,255,255,.98)}.footer{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;color:var(--muted);font-size:14px;font-weight:700;padding:0 4px}.progress{height:7px;border-radius:999px;background:rgba(11,99,209,.10);overflow:hidden}.bar{height:100%;width:0%;background:linear-gradient(90deg,#0b63d1,#27b0ff);border-radius:inherit;transition:width 220ms ease}.status{white-space:nowrap}@media(max-width:860px){.app{padding:12px}.topbar,.slide-head,.footer{grid-template-columns:1fr}.actions{justify-content:flex-start}.time{padding-bottom:0}.point p,.point li{font-size:calc(22px * var(--base))}}@media print{body{background:#fff}.topbar,.footer{display:none}.app{padding:0;display:block}.slide{display:block!important;break-after:page}.content{overflow:visible}.section,.point{box-shadow:none}}
  </style>
</head>
<body>
  <main class="app"><header class="topbar"><div class="brand"><div class="kicker">練息場《心理能量管理》錄影大字報</div><h1 id="deckTitle">現場提示版</h1></div><div class="actions" aria-label="簡報控制"><select class="select" id="slideSelect" aria-label="選擇頁面"></select><button class="icon-btn" id="prevBtn" title="上一頁" aria-label="上一頁">‹</button><button class="icon-btn" id="nextBtn" title="下一頁" aria-label="下一頁">›</button><button class="icon-btn" id="smallerBtn" title="縮小文字" aria-label="縮小文字">A−</button><button class="icon-btn" id="largerBtn" title="放大文字" aria-label="放大文字">A+</button><button class="pill" id="resetBtn">還原本頁</button><button class="pill primary" id="saveBtn">已自動儲存</button></div></header><section class="stage" id="stage" aria-live="polite"></section><footer class="footer"><span id="pageCount">1 / 5</span><div class="progress" aria-hidden="true"><div class="bar" id="bar"></div></div><span class="status" id="status">改字會存在這台電腦</span></footer></main>
  <script>
    const STORAGE_KEY="jte-recording-cue-v10"; const FONT_KEY="jte-recording-cue-font-scale";
    const defaultSlides=[
      {eyebrow:"課程說明",title:"背景程式的無聲消耗",time:"建議 8 分鐘",cue:"先讓大家知道：不是你壞掉，是背景程式太耗電。",sections:[{title:"開場",points:[["打招呼","冠瑋、立希開場，說明這是《心理能量管理》課程。"],["研究起源","練息場和心理師團隊，整理 500 多位高壓工作者的真實對話。"],["本集定位","這堂課不是要大家更努力，而是看見那些關不掉的心理耗電。"]]},{title:"痛點",points:[["高功能壓抑","外表穩、效率高，心裡卻一直覺得：再撐一下就好了。"],["手機電量比喻","真正耗電的不是工作本身，而是一直在背景跑的程式。"],["常見背景程式","全時待命、自我審查、情緒防護。它們看起來像負責，其實在偷走能量。"]]},{title:"心理學知識",points:[["課程理念","知識要輕，但工具要能用；解方來自 500 位工作者的共同痛點。"],["優勢副作用","內省負責很珍貴，但過頭就會變成過度自責。"],["三個工具","CBT 幫你換框架；課題分離幫你分清責任；薩提爾幫你看懂自己的溝通姿態。"]]},{title:"解方工具或回家作業",points:[["AI 助教","它不是給大道理，而是用提問幫你把感受命名。"],["命名的效果","從「我好爛」變成「我怕讓對方失望」，壓力會小很多。"],["真人支持","完成小作業後，可以再預約心理師或療癒師，做更深的自我探索。"]]}],quote:"下集主題｜內耗覺察：第一集先問，你到底是在煩什麼？",notes:"冠瑋：多帶情緒共感，讓觀眾覺得被懂。立希：收斂到背景程式、心理學工具、AI 助教功能。兩人可自然穿插自己的經驗。"},
      {eyebrow:"第 1 集",title:"內耗覺察",time:"建議 8 分鐘",cue:"卡住你的通常不是那件事，而是你對那件事的看法。",sections:[{title:"開場",points:[["先接住觀眾","你以為自己累在工作，其實可能累在不斷預測別人怎麼看你。"],["本集目標","把模糊的內耗看清楚，知道自己到底在煩什麼。"]]},{title:"痛點",points:[["溝通任務","表面是在煩難搞的 PM，根源是大腦一直跑自我審查程式。"],["老闆太爛","表面是主管情緒不穩，根源可能是權威恐懼和全時待命。"],["工作超載","表面是同事一直塞事，根源可能是界限消失、太怕衝突。"],["溝通無效","表面是東西被改三遍，根源是把工作成果綁到自我價值。"]]},{title:"心理學知識",points:[["內耗的真相","內耗常是一種朦朧、說不清楚的心理狀態。"],["大腦討厭模糊","危險源不清楚時，杏仁核會先警戒，身體就開始耗能。"],["命名的力量","把黑影看清楚、說出名字，前額葉就比較能接手處理。"]]},{title:"解方工具或回家作業",points:[["AI 助教","用 CBT 的具體化技術，加上蘇格拉底式提問，陪你問到底。"],["使用方式","輸入一次內耗事件：發生什麼、直覺反應、最怕什麼、真正卡住的是什麼。"],["結語","覺察不是為了解決內耗，而是為了理解自己。"]]}],quote:"下集主題｜災難化思考：主管已讀不回，你是不是已經在腦內播放末日電影？",notes:"冠瑋：負責帶入表層痛點。立希：一刀見血點出心理根源。語氣要像陪朋友把霧撥開。"},
      {eyebrow:"第 2 集",title:"災難化思考",time:"建議 10 分鐘",cue:"你是在預警風險，還是在腦內排演末日？",sections:[{title:"開場",points:[["先肯定責任感","責任感是優勢，但不該變成攻擊自己的武器。"],["宣布主題","今天談災難化思考：一件小事，為什麼會被大腦推到世界末日。"]]},{title:"痛點",points:[["不敢請假","一想到請假，就開始腦補案子崩掉、同事討厭你。"],["發信卡住","檢查到不能送出，因為把事的錯誤和人的價值綁在一起。"],["身體末日感","熬夜頭暈，就一路想到大病、工作崩、家庭崩。"],["生理警訊","胃痛、腸躁、睡前停不下來，都可能是身體在提醒你。"]]},{title:"心理學知識",points:[["負責 vs 災難化","負責看可控行動；災難化盯著不可控的極端崩塌。"],["四個警訊","思考癱瘓、生理反撲、行為拖延、執著不可控。"],["三個濾鏡","全有全無、武斷推論、貼標籤。理智知道，腦內小劇場還是會跑。"]]},{title:"解方工具或回家作業",points:[["理性分析金字塔","把恐懼拆成：客觀狀態、內耗濾鏡、末日想像。"],["請假焦慮示範","底層：我累了。中層：怕造成麻煩。頂端：怕印象變差、進度爆炸。"],["結語","當模糊的恐懼變成清晰的行動，恐懼就會失去力量。"]]}],quote:"下集主題｜討好型溝通：為什麼心裡想說「不」，開口卻說「好」？",notes:"可以讓冠瑋丟生活感很強的例子，立希負責把它拆成濾鏡與金字塔。下集預告：討好型溝通。"},
      {eyebrow:"第 3 集",title:"討好型溝通",time:"建議 10 分鐘",cue:"為什麼心裡想說「不」，開口卻說「好」？",sections:[{title:"開場",points:[["點出主題","這不只是溝通技巧，而是心理能量的隱形漏洞。"],["先讓觀眾有感","很多人不是不會拒絕，是一想到拒絕就先覺得危險。"]]},{title:"痛點",points:[["難搞案子","需求模糊又不合理，明明想拒絕，卻怕尷尬先說好。"],["夾心主管","對上不敢要資源，對下不敢講期待，只好自己扛。"],["生理需求","連想上廁所、喝水都要自我審查，怕破壞氣氛。"],["深層翻轉","你以為自己在顧全大局，其實是在用透支自己換暫時安全。"]]},{title:"心理學知識",points:[["薩提爾生存姿態","討好型會忽略自己，只把他人和環境放到最大。"],["內在恐懼","害怕衝突，也害怕別人不滿意就代表自己沒有價值。"],["文化濾鏡","華人文化重視和諧，但過度和諧常常是個人在乾燒。"]]},{title:"解方工具或回家作業",points:[["AI 溝通草擬助手","先蒐集對方風格、關係深度、你的真實需求。"],["產出價值","幫你寫出溫和但堅定的草稿，先打破寫不出來的焦慮。"],["結語","委屈不會求全，只會求得內在的枯竭。"]]}],quote:"下集主題｜比較心態：怎麼拿回自己的一把尺，不再用別人的標準量生活？",notes:"這集要避免變成教訓觀眾。重點是：討好曾經是保護自己的方式，只是現在需要升級。"},
      {eyebrow:"第 4 集",title:"比較心態",time:"建議 10 分鐘",cue:"所有比較內耗，都像拿著別人的尺，在量自己的生活。",sections:[{title:"開場",points:[["課程名稱","練息場《心理能量管理》。冠瑋帶情緒共感，立希做邏輯拆解。"],["核心問題","我們常用別人的進度，來審判自己的生活。"]]},{title:"痛點",points:[["專業純度","非本科或半路出家，就覺得自己低人一等。"],["生活選擇","想慢下來，卻看見同儕往前衝，就覺得自己不長進。"],["職級年資","拿自己的起跑點，去比別人的全速衝刺期。"],["內耗現象","比較讓人自我矮化、怕掉隊，也更容易對權威退縮。"]]},{title:"心理學知識",points:[["社會比較理論","人天生會評價自己；缺乏客觀標準時，就容易拿別人定位自己。"],["單一標準的暴力","大腦愛省力，常只看職位、薪水、成就，忘了背後成本。"],["三種比較","向上比較找苦吃，平行比較找焦慮，向下比較找短暫安慰。"]]},{title:"解方工具或回家作業",points:[["比較基準白板","公式：對方的成就 = 我的成就 + 5 個不可比因素。"],["還原真相","列出年資、背景、資源、健康代價、支援系統，把能力問題還原成資源差異。"],["結語","別在別人的賽道上跑馬拉松，因為你的終點根本不在那裡。"]]}],quote:"下集主題｜能量永續：怎麼建立長期可維持的回充節奏？",notes:"這集要讓觀眾感覺：不是不能羨慕別人，而是比較前要先把資源差異和價值觀放回來。"}
    ];
    let slides=loadSlides(); let current=0; let fontScale=Number(localStorage.getItem(FONT_KEY)||"1"); const stage=document.getElementById("stage"),slideSelect=document.getElementById("slideSelect"),pageCount=document.getElementById("pageCount"),bar=document.getElementById("bar"),status=document.getElementById("status"),saveBtn=document.getElementById("saveBtn");
    function loadSlides(){try{const saved=localStorage.getItem(STORAGE_KEY);return saved?JSON.parse(saved):structuredClone(defaultSlides)}catch(error){return structuredClone(defaultSlides)}} function saveSlides(message="已自動儲存"){localStorage.setItem(STORAGE_KEY,JSON.stringify(slides));status.textContent=message;saveBtn.textContent=message;clearTimeout(saveSlides.timer);saveSlides.timer=setTimeout(()=>{saveBtn.textContent="已自動儲存";status.textContent="改字會存在這台電腦"},1600)} function escapeHtml(value){return String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")} function pointTemplate(point,si,ci,pi){return `<article class="point"><div class="label" contenteditable="true" data-path="${si}.sections.${ci}.points.${pi}.0">${escapeHtml(point[0])}</div><p contenteditable="true" data-path="${si}.sections.${ci}.points.${pi}.1">${escapeHtml(point[1])}</p></article>`}
    function render(){document.documentElement.style.setProperty("--base",fontScale);stage.innerHTML=slides.map((slide,si)=>`<article class="slide ${si===current?"active":""}" data-slide="${si}"><div class="slide-head"><div><div class="episode" contenteditable="true" data-path="${si}.eyebrow">${escapeHtml(slide.eyebrow)}</div><h2 class="title" contenteditable="true" data-path="${si}.title">${escapeHtml(slide.title)}</h2></div><div class="time" contenteditable="true" data-path="${si}.time">${escapeHtml(slide.time)}</div></div><div class="content"><div class="cue" contenteditable="true" data-path="${si}.cue">${escapeHtml(slide.cue)}</div>${slide.sections.map((section,ci)=>`<section class="section"><div class="section-title" contenteditable="true" data-path="${si}.sections.${ci}.title">${escapeHtml(section.title)}</div><div class="points">${section.points.map((point,pi)=>pointTemplate(point,si,ci,pi)).join("")}</div></section>`).join("")}<div class="quote" contenteditable="true" data-path="${si}.quote">${escapeHtml(slide.quote)}</div><div class="notes" contenteditable="true" data-path="${si}.notes">${escapeHtml(slide.notes)}</div></div></article>`).join("");slideSelect.innerHTML=slides.map((slide,index)=>`<option value="${index}" ${index===current?"selected":""}>${index+1}. ${escapeHtml(slide.eyebrow)}｜${escapeHtml(slide.title)}</option>`).join("");pageCount.textContent=`${current+1} / ${slides.length}`;bar.style.width=`${((current+1)/slides.length)*100}%`;document.getElementById("deckTitle").textContent=`${slides[current].eyebrow}｜${slides[current].title}`}
    function setByPath(path,value){const keys=path.split(".");let target=slides;for(let i=0;i<keys.length-1;i++)target=target[keys[i]];target[keys.at(-1)]=value.trim()} stage.addEventListener("input",event=>{const path=event.target.dataset.path;if(!path)return;setByPath(path,event.target.innerText);saveSlides("已儲存修改");renderSelectOnly()}); function renderSelectOnly(){const activeOption=slideSelect.options[current];if(activeOption)activeOption.textContent=`${current+1}. ${slides[current].eyebrow}｜${slides[current].title}`;document.getElementById("deckTitle").textContent=`${slides[current].eyebrow}｜${slides[current].title}`} function goTo(index){current=Math.max(0,Math.min(slides.length-1,index));render()}
    document.getElementById("prevBtn").addEventListener("click",()=>goTo(current-1));document.getElementById("nextBtn").addEventListener("click",()=>goTo(current+1));slideSelect.addEventListener("change",event=>goTo(Number(event.target.value)));document.getElementById("largerBtn").addEventListener("click",()=>{fontScale=Math.min(1.28,Math.round((fontScale+.06)*100)/100);localStorage.setItem(FONT_KEY,String(fontScale));render()});document.getElementById("smallerBtn").addEventListener("click",()=>{fontScale=Math.max(.82,Math.round((fontScale-.06)*100)/100);localStorage.setItem(FONT_KEY,String(fontScale));render()});document.getElementById("resetBtn").addEventListener("click",()=>{slides[current]=structuredClone(defaultSlides[current]);saveSlides("本頁已還原");render()});document.addEventListener("keydown",event=>{if(event.target.isContentEditable)return;if(event.key==="ArrowRight"||event.key==="PageDown"||event.key===" "){event.preventDefault();goTo(current+1)}if(event.key==="ArrowLeft"||event.key==="PageUp"){event.preventDefault();goTo(current-1)}});render();
  </script>
</body>
</html>
