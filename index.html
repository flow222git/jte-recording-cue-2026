<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>練息場｜心理能量管理 錄影大字報</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(0, 0, 0, .08);
      --blue: #0071e3;
      --blue-deep: #004b9b;
      --aqua: #eef7ff;
      --paper: #ffffff;
      --warm: #fff8e8;
      --glass: rgba(255, 255, 255, .72);
      --shadow: 0 24px 70px rgba(0, 0, 0, .10);
      --ease: cubic-bezier(.4, 0, .2, 1);
      --base: 1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, #ffffff 0%, #f5f5f7 46%, #eef4f8 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }

    button, select {
      font: inherit;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 18px;
      padding: 12px 24px;
      color: var(--ink);
      background: rgba(255, 255, 255, .72);
      border-bottom: 1px solid rgba(0, 0, 0, .06);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand strong {
      font-size: 20px;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand span {
      color: var(--muted);
      font-size: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn, select {
      min-width: 42px;
      height: 38px;
      border: 1px solid rgba(0, 0, 0, .08);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, .74);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
      cursor: pointer;
      transition: transform .22s var(--ease), background .22s var(--ease), box-shadow .22s var(--ease);
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      padding: 0 12px;
      font-weight: 800;
    }

    .icon-btn:hover,
    select:hover,
    .nav-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, .95);
      box-shadow: 0 10px 24px rgba(0, 0, 0, .10);
    }

    select {
      max-width: 240px;
      padding: 0 10px;
      color: var(--ink);
      background: var(--paper);
    }

    .status {
      min-width: 96px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .stage {
      position: relative;
      min-height: 0;
      padding: 28px;
    }

    .slide {
      height: 100%;
      display: none;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 24px;
    }

    .slide.active {
      display: grid;
    }

    .rail {
      min-height: 0;
      padding: 26px 22px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: var(--shadow);
    }

    .episode-no {
      color: var(--blue);
      font-size: 17px;
      font-weight: 800;
    }

    .episode-title {
      margin-top: 12px;
      font-size: 31px;
      line-height: 1.18;
      font-weight: 900;
    }

    .runtime {
      margin-top: 16px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .section-list {
      display: grid;
      gap: 10px;
      margin-top: 28px;
    }

    .section-pill {
      padding: 10px 12px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, .7);
      font-size: 16px;
      font-weight: 800;
    }

    .section-pill.current {
      color: var(--paper);
      background: var(--blue);
    }

    .card {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, .82);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      padding: 26px 34px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, .94), rgba(247, 250, 252, .74));
    }

    .kicker {
      color: var(--blue);
      font-size: calc(20px * var(--base));
      font-weight: 900;
    }

    h1 {
      margin: 8px 0 0;
      font-size: calc(42px * var(--base));
      line-height: 1.12;
      letter-spacing: 0;
    }

    .content {
      min-height: 0;
      overflow-y: auto;
      padding: 28px 34px 34px;
      scroll-behavior: smooth;
    }

    .segment {
      padding-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }

    .segment + .segment {
      padding-top: 28px;
    }

    .segment:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .segment-title {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin: 0 0 12px;
      color: var(--blue-deep);
      font-size: calc(32px * var(--base));
      line-height: 1.18;
      font-weight: 900;
    }

    .segment-title small {
      color: var(--blue);
      font-size: calc(18px * var(--base));
      font-weight: 900;
    }

    .segment-headline {
      margin: 0 0 14px;
      color: var(--ink);
      font-size: calc(34px * var(--base));
      line-height: 1.18;
      font-weight: 900;
    }

    .cue {
      margin: 0 0 22px;
      padding: 18px 20px;
      border-left: 5px solid var(--blue);
      border-radius: 14px;
      background: linear-gradient(180deg, #f3faff, #e9f5ff);
      font-size: calc(23px * var(--base));
      line-height: 1.45;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .point {
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, .78);
      box-shadow: 0 1px 0 rgba(255, 255, 255, .8) inset;
    }

    .point.full { grid-column: 1 / -1; }

    .label {
      display: block;
      margin-bottom: 8px;
      color: var(--blue-deep);
      font-size: calc(19px * var(--base));
      font-weight: 900;
    }

    .point p,
    .point li,
    .note li {
      font-size: calc(24px * var(--base));
      line-height: 1.42;
    }

    .point p {
      margin: 0;
    }

    ul, ol {
      margin: 8px 0 0;
      padding-left: 1.25em;
    }

    li + li { margin-top: 8px; }

    .quote {
      margin-top: 18px;
      padding: 18px 20px;
      border-radius: 14px;
      background: var(--warm);
      color: #564417;
      font-size: calc(27px * var(--base));
      line-height: 1.32;
      font-weight: 900;
    }

    .footer {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 16px;
      padding: 12px 24px 16px;
      background: rgba(255, 255, 255, .72);
      border-top: 1px solid rgba(0, 0, 0, .06);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }

    .nav-btn {
      height: 44px;
      min-width: 96px;
      border: 1px solid rgba(0, 113, 227, .26);
      border-radius: 999px;
      color: var(--blue);
      background: rgba(255, 255, 255, .82);
      font-weight: 900;
      cursor: pointer;
      transition: transform .22s var(--ease), background .22s var(--ease), box-shadow .22s var(--ease);
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .08);
      overflow: hidden;
    }

    .bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #0071e3, #62b5ff);
      transition: width .2s ease;
    }

    .counter {
      min-width: 90px;
      color: var(--muted);
      text-align: right;
      font-weight: 800;
    }

    .help {
      position: fixed;
      left: 24px;
      bottom: 72px;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 14px;
      color: var(--muted);
      background: rgba(255, 255, 255, .82);
      border: 1px solid var(--line);
      font-size: 14px;
      box-shadow: var(--shadow);
    }

    .editable {
      outline: 0;
      border-radius: 6px;
    }

    body.editing .editable {
      cursor: text;
      box-shadow: 0 0 0 2px rgba(15, 126, 168, .28);
      background-image: linear-gradient(rgba(15, 126, 168, .055), rgba(15, 126, 168, .055));
    }

    body.editing .editable:focus {
      box-shadow: 0 0 0 3px rgba(15, 126, 168, .48);
      background: #fffdf4;
    }

    body.editing #editMode {
      color: var(--blue-deep);
      background: #eaf4ff;
      border-color: rgba(0, 113, 227, .3);
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .app { min-height: 100vh; height: auto; }
      .topbar {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 12px 18px;
      }
      .brand strong { max-width: 100%; }
      .controls {
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 2px;
      }
      .icon-btn, select {
        flex: 0 0 auto;
        height: 36px;
      }
      select { max-width: 180px; }
      .status { display: none; }
      .stage { min-height: calc(100vh - 128px); }
      .slide,
      .slide.active {
        min-height: calc(100vh - 184px);
        grid-template-columns: 1fr;
      }
      .rail { display: none; }
      .grid { grid-template-columns: 1fr; }
      .content { overflow: visible; }
      .help { display: none; }
      .brand span { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <strong>練息場｜心理能量管理</strong>
        <span id="currentTitle">錄影大字報</span>
      </div>
      <div class="controls" aria-label="播放控制">
        <select id="jumpSelect" aria-label="跳到指定頁"></select>
        <button class="icon-btn" id="editMode" title="開關文字編輯模式">編輯</button>
        <button class="icon-btn" id="downloadHtml" title="下載包含目前文字的 HTML">下載</button>
        <button class="icon-btn" id="resetText" title="清除現場修改，回到原始版">重置</button>
        <button class="icon-btn" id="smaller" title="縮小字級">A-</button>
        <button class="icon-btn" id="larger" title="放大字級">A+</button>
        <button class="icon-btn" id="fullscreen" title="全螢幕">⛶</button>
        <span class="status" id="saveStatus">已儲存</span>
      </div>
    </header>

    <main class="stage" id="stage"></main>

    <footer class="footer">
      <button class="nav-btn" id="prev">上一頁</button>
      <div class="progress" aria-hidden="true"><div class="bar" id="bar"></div></div>
      <button class="nav-btn" id="next">下一頁</button>
      <div class="counter" id="counter">1 / 1</div>
    </footer>
  </div>

  <div class="help">鍵盤：← → 換頁，↑ ↓ 捲動本頁，F 全螢幕，+ / - 調字級。按「編輯」後可直接改字，會自動儲存。</div>

    const STORAGE_KEY = "jte-recording-cue-v1";
    const slides = loadSavedSlides();

    const stage = document.getElementById("stage");
    const jumpSelect = document.getElementById("jumpSelect");
    const currentTitle = document.getElementById("currentTitle");
    const counter = document.getElementById("counter");
    const bar = document.getElementById("bar");
    const prev = document.getElementById("prev");
    const next = document.getElementById("next");
    const saveStatus = document.getElementById("saveStatus");
    let current = 0;
    let base = 1;
    let editing = false;
    let saveTimer;

    function loadSavedSlides() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : structuredClone(episodes);
      } catch {
        return structuredClone(episodes);
      }
    }

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function getByPath(path) {
      return path.split(".").reduce((target, key) => target?.[key], slides);
    }

    function setByPath(path, value) {
      const keys = path.split(".");
      const last = keys.pop();
      const target = keys.reduce((currentTarget, key) => currentTarget[key], slides);
      target[last] = value;
    }

    function editableText(value, path, tag = "span", className = "") {
      const classes = ["editable", className].filter(Boolean).join(" ");
      const contenteditable = editing ? "true" : "false";
      return `<${tag} class="${classes}" data-path="${path}" contenteditable="${contenteditable}" spellcheck="false">${escapeHTML(value)}</${tag}>`;
    }

    function setStatus(text) {
      saveStatus.textContent = text;
    }

    function saveNow() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(slides));
      setStatus("已儲存");
    }

    function queueSave() {
      setStatus("儲存中");
      window.clearTimeout(saveTimer);
      saveTimer = window.setTimeout(saveNow, 250);
    }

    function pointTemplate([label, text], index, pointsCount, path) {
      const full = pointsCount % 2 === 1 && index === pointsCount - 1 ? " full" : "";
      return `<article class="point${full}">
        ${editableText(label, `${path}.0`, "span", "label")}
        ${editableText(text, `${path}.1`, "p")}
      </article>`;
    }

    function sectionTemplate(page, episodeIndex, pageIndex) {
      const pagePath = `${episodeIndex}.pages.${pageIndex}`;
      return `
        <section class="segment" id="section-${pageIndex}">
          <h2 class="segment-title"><small>${String(pageIndex + 1).padStart(2, "0")}</small>${page.section}</h2>
          ${editableText(page.headline, `${pagePath}.headline`, "h3", "segment-headline")}
          ${editableText(page.cue, `${pagePath}.cue`, "p", "cue")}
          <div class="grid">
            ${page.points.map((point, pointIndex) => pointTemplate(point, pointIndex, page.points.length, `${pagePath}.points.${pointIndex}`)).join("")}
          </div>
          ${page.quote ? editableText(page.quote, `${pagePath}.quote`, "div", "quote") : ""}
        </section>
      `;
    }

    function renderSlides() {
      stage.innerHTML = slides.map((episode, index) => `
        <section class="slide" data-index="${index}" aria-label="${episode.title}">
          <aside class="rail">
            <div class="episode-no">第 ${episode.no} 集</div>
            ${editableText(episode.title, `${index}.title`, "div", "episode-title")}
            <div class="runtime">
              ${editableText(episode.subtitle, `${index}.subtitle`, "div")}
              ${editableText(episode.runtime, `${index}.runtime`, "div")}
            </div>
            <div class="section-list">
              ${sections.map((section) => `<div class="section-pill">${section}</div>`).join("")}
            </div>
          </aside>
          <article class="card">
            <header class="card-head">
              <div class="kicker">第 ${episode.no} 集 · ${escapeHTML(episode.subtitle)}</div>
              ${editableText(episode.title, `${index}.title`, "h1")}
            </header>
            <div class="content">
              ${episode.pages.map((page, pageIndex) => sectionTemplate(page, index, pageIndex)).join("")}
            </div>
          </article>
        </section>
      `).join("");

      jumpSelect.innerHTML = slides.map((episode, index) =>
        `<option value="${index}">${String(index + 1).padStart(2, "0")}｜${episode.title}</option>`
      ).join("");
    }

    function update() {
      document.querySelectorAll(".slide").forEach((slide, index) => {
        slide.classList.toggle("active", index === current);
      });
      const episode = slides[current];
      currentTitle.textContent = `${episode.title}`;
      jumpSelect.value = String(current);
      counter.textContent = `${current + 1} / ${slides.length}`;
      bar.style.width = `${((current + 1) / slides.length) * 100}%`;
      prev.disabled = current === 0;
      next.disabled = current === slides.length - 1;
      const content = document.querySelector(".slide.active .content");
      if (content) content.scrollTop = 0;
    }

    function refreshAfterTextChange(path, value) {
      setByPath(path, value.trim());
      const [episodeIndex, key] = path.split(".");
      if (key === "title") {
        document.querySelectorAll(`[data-path="${path}"]`).forEach((node) => {
          if (node.textContent !== value) node.textContent = value;
        });
        const option = jumpSelect.querySelector(`option[value="${episodeIndex}"]`);
        if (option) option.textContent = `${String(Number(episodeIndex) + 1).padStart(2, "0")}｜${value}`;
        if (Number(episodeIndex) === current) currentTitle.textContent = value;
      }
      queueSave();
    }

    function toggleEditMode(force) {
      editing = typeof force === "boolean" ? force : !editing;
      document.body.classList.toggle("editing", editing);
      document.querySelectorAll(".editable").forEach((node) => {
        node.contentEditable = editing ? "true" : "false";
      });
      document.getElementById("editMode").textContent = editing ? "完成" : "編輯";
      setStatus(editing ? "編輯中" : "已儲存");
      if (!editing) saveNow();
    }

    function downloadCurrentHTML() {
      saveNow();
      const html = "<!doctype html>\n" + document.documentElement.outerHTML.replace(
        /const episodes = \[[\s\S]*?\n    \];\n\n    const STORAGE_KEY/,
        `const episodes = ${JSON.stringify(slides, null, 4)};\n\n    const STORAGE_KEY`
      );
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const stamp = new Date().toISOString().slice(0, 16).replace("T", "_").replace(":", "");
      link.href = url;
      link.download = `練息場_錄影大字報_最後版_${stamp}.html`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      setStatus("已下載");
    }

    function resetText() {
      if (!window.confirm("確定要清除現場修改，回到原始版嗎？")) return;
      localStorage.removeItem(STORAGE_KEY);
      slides.splice(0, slides.length, ...structuredClone(episodes));
      renderSlides();
      update();
      toggleEditMode(false);
      setStatus("已重置");
    }

    function go(delta) {
      current = Math.max(0, Math.min(slides.length - 1, current + delta));
      update();
    }

    function setFont(delta) {
      base = Math.max(.82, Math.min(1.35, base + delta));
      document.documentElement.style.setProperty("--base", base.toFixed(2));
    }

    renderSlides();
    update();

    prev.addEventListener("click", () => go(-1));
    next.addEventListener("click", () => go(1));
    stage.addEventListener("input", (event) => {
      const target = event.target.closest("[data-path]");
      if (!target || !editing) return;
      refreshAfterTextChange(target.dataset.path, target.textContent);
    });
    stage.addEventListener("keydown", (event) => {
      if (!editing) return;
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        event.target.blur();
      }
      event.stopPropagation();
    });
    document.getElementById("editMode").addEventListener("click", () => toggleEditMode());
    document.getElementById("downloadHtml").addEventListener("click", downloadCurrentHTML);
    document.getElementById("resetText").addEventListener("click", resetText);
    jumpSelect.addEventListener("change", (event) => {
      current = Number(event.target.value);
      update();
    });
    document.getElementById("smaller").addEventListener("click", () => setFont(-.06));
    document.getElementById("larger").addEventListener("click", () => setFont(.06));
    document.getElementById("fullscreen").addEventListener("click", () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    window.addEventListener("keydown", (event) => {
      const activeContent = document.querySelector(".slide.active .content");
      if (event.key === "ArrowRight" || event.key === "PageDown") {
        event.preventDefault();
        go(1);
      }
      if (event.key === "ArrowLeft" || event.key === "PageUp") {
        event.preventDefault();
        go(-1);
      }
      if (event.key === "ArrowDown" && activeContent) {
        event.preventDefault();
        activeContent.scrollBy({ top: 180, behavior: "smooth" });
      }
      if (event.key === "ArrowUp" && activeContent) {
        event.preventDefault();
        activeContent.scrollBy({ top: -180, behavior: "smooth" });
      }
      if (event.key === "+" || event.key === "=") setFont(.06);
      if (event.key === "-" || event.key === "_") setFont(-.06);
      if (event.key.toLowerCase() === "f") document.getElementById("fullscreen").click();
    });
  </script>
</body>
</html>
